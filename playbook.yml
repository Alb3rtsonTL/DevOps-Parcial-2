- name: Configurar servidores web
  hosts: webservers
  become: true

  tasks:
    - name: Instalar nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Copiar página web
      copy:
        src: site/
        dest: /var/www/html/
        mode: '0644'

    - name: Iniciar nginx
      service:
        name: nginx
        state: started
        enabled: true